spring.datasource.url=jdbc:mysql://localhost:3306/farm2retail
spring.datasource.username=root
spring.datasource.password=12345

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
logging.level.org.springframework.security=TRACE

# JWT Configuration
jwt.secret=MySecretKeyForFarmConnectApplicationThatIsAtLeast32CharactersLong1234567890
jwt.expiration=86400000

# Razorpay Configuration
razorpay.key.id=YOUR_RAZORPAY_KEY_ID
razorpay.key.secret=YOUR_RAZORPAY_KEY_SECRET

# Increase payload max sizes for Base64 Images
server.tomcat.max-http-form-post-size=20MB
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
server.tomcat.max-swallow-size=20MB
